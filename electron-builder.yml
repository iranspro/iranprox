appId: pro.iran.client
productName: ایران پرو
copyright: Copyright © 2026 Iran Pro
directories:
  output: dist
  buildResources: build
files:
  - src/**/*
  - "!**/*.map"

win:
  target:
    - target: nsis
      arch:
        - x64
  requestedExecutionLevel: requireAdministrator   # needed for TUN / wintun driver
  extraResources:
    - from: core
      to: core
      filter:
        - sing-box.exe
        - wintun.dll
        - config.json

nsis:
  oneClick: false
  perMachine: true
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: ایران پرو
  artifactName: IranPro-Setup-${version}.${ext}

mac:
  target:
    - target: dmg
      arch:
        - arm64
        - x64
  category: public.app-category.utilities
  hardenedRuntime: false
  gatekeeperAssess: false
  identity: null                 # unsigned (no Apple Developer cert)
  artifactName: IranPro-${version}-${arch}.${ext}
  extraResources:
    - from: core
      to: core
      filter:
        - sing-box-darwin-*
        - config.json

dmg:
  title: ایران پرو
  artifactName: IranPro-${version}-${arch}.${ext}
